name: edutrack_mobile
description: "EduTrack Mobile App untuk Mahasiswa"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Networking & Storage
  http: ^1.2.0
  shared_preferences: ^2.2.2

  # State Management
  provider: ^6.1.1

  # Utilities
  intl: ^0.19.0

  # Media & WebView
  image_picker: ^1.1.0
  webview_flutter: ^4.10.0
  web: ^1.0.0

  # Supabase
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0E27"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/lifestyle/LifestyleAssessment.html
    - assets/lifestyle/LifeStyleSuggestionPage.html
    - assets/images/kampus.jpg